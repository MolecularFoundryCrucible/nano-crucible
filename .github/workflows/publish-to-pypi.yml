name: Publish Python distribution to PyPI

on:
  release:
    types: [published]
    
jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
  
    steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - name: Check version matches tag
          run: |
            TAG_VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            INIT_VERSION=$(grep -Po '(?<=__version__ = ")[^"]*' crucible/__init__.py)
            if [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
              echo "Version mismatch: tag=$TAG_VERSION, __init__.py=$INIT_VERSION"
              exit 1
            fi
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.x"
        - name: Install pypa/build
          run: >-
           python3 -m
           pip install
           build
           --user
        - name: Build a binary wheel and a source tarball
          run: python -m build
        - name: Store the distribution packages
          uses: actions/upload-artifact@v4
          with:
            name: python-package-distributions
            path: dist/

  publish-to-pypi:        
    name: Publish Python distribution to PyPI
    # if: startsWith(github.event.ref, 'refs/tags/') # only if tagged
    
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: release
      url: https://pypi.org/p/nano-crucible

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
        - name: Download all the dists
          uses: actions/download-artifact@v4
          with:
            name: python-package-distributions
            path: dist/
        - name: Publish distribution to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
