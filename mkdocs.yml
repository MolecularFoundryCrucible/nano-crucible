site_name: nano-crucible
site_description: Python client library and CLI for Crucible — the Molecular Foundry's scientific data management platform
site_url: https://MolecularFoundryCrucible.github.io/nano-crucible/
repo_url: https://github.com/MolecularFoundryCrucible/nano-crucible
repo_name: MolecularFoundryCrucible/nano-crucible
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            members_order: source
            show_root_heading: true
            show_submodules: false
            show_bases: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Core Concepts: concepts.md
  - User Guide:
    - Working with Datasets: user-guide/datasets.md
    - Working with Samples: user-guide/samples.md
    - Project Management: user-guide/projects.md
    - Working with Instruments: user-guide/instruments.md
    - Linking Resources: user-guide/linking.md
    - Downloading Data: user-guide/downloading.md
    - Scientific Metadata: user-guide/scientific-metadata.md
  - CLI Reference:
    - Overview: cli/index.md
    - Command Reference: cli/reference.md
  - API Reference:
    - CrucibleClient: api-reference/client.md
    - Datasets: api-reference/datasets.md
    - Samples: api-reference/samples.md
    - Projects: api-reference/projects.md
    - Instruments: api-reference/instruments.md
    - Users: api-reference/users.md
    - Graphs: api-reference/graphs.md
    - Models: api-reference/models.md
